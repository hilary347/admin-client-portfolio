<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="admin_login.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ADMIN LOGIN PAGE -->

    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="glass p-5" style="width: 400px">
        <h3 class="text-center mb-4" style="color: white">Admin Login</h3>

        <form>
          <div class="mb-3">
            <input
              type="email"
              class="form-control glass-input"
              placeholder="Email"
            />
          </div>

          <div class="mb-3">
            <input
              type="password"
              class="form-control glass-input"
              placeholder="Password"
            />
          </div>

          <div class="d-flex justify-content-center">
            <button class="button-28 login-button" role="button">Login</button>
          </div>
          <a
            href="forgot-password.html"
            class="text-decoration-none d-block text-center mt-3"
            style="color: gray"
            >Forgot password?</a
          >
        </form>
      </div>
    </div>
  </body>
</html>
