<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Panel</title>
    <link rel="stylesheet" href="admin_dashboard.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <button class="hamburger d-md-none" onclick="toggleSidebar()">☰</button>
        <span class="navbar-brand"><b>Light's</b> Dashboard</span>
        <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 sidebar d-none d-md-block">
          <div class="nav-links">
            <button class="nav-btn active-btn" onclick="showTab('projectsTab')">
              Manage Projects
            </button>
            <button class="nav-btn" onclick="showTab('bioTab')">
              Edit Bio
            </button>
            <button class="nav-btn" onclick="showTab('inboxTab')">Inbox</button>
          </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 offset-md-3 col-12 main-content">
          <!-- Project Management Section -->
          <div id="projectsTab" class="admin-content">
            <!-- Add Project -->
            <section class="content-box">
              <h3>Add New Project</h3>

              <div class="form-box">
                <input type="text" id="pName" placeholder="Project Name" />
                <input type="text" id="pDesc" placeholder="Description" />
                <input type="text" id="pImg" placeholder="Image URL" />
                <button class="save-btn" onclick="addProject()">
                  Save Project
                </button>
              </div>
            </section>

            <!-- Existing Projects -->
            <section class="content-box">
              <h3>Existing Projects</h3>

              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Action</th>
                  </tr>
                </thead>

                <tbody id="projectList"></tbody>
              </table>
            </section>
          </div>

          <!-- Bio Section -->
          <div id="bioTab" class="admin-content" style="display: none">
            <section class="content-box">
              <h3>Update Bio</h3>
              <textarea
                id="bioInput"
                class="form-control mb-2"
                rows="5"
              ></textarea>
              <button onclick="saveBio()" class="save-btn">
                Update About Me
              </button>
            </section>
          </div>

          <!-- Inbox Section -->
          <div id="inboxTab" class="admin-content" style="display: none">
            <section class="content-box">
              <h3>Messages</h3>
              <div id="messageList"></div>
            </section>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Security check: Redirect to login page if the user is not authenticated as an admin
      if (sessionStorage.getItem("isAdmin") !== "true") {
        window.location.href = "admin_login.html";
      }

      // Function to log out the admin by clearing session storage and redirecting to login page
      function logout() {
        sessionStorage.clear();
        window.location.href = "admin_login.html";
      }

      // Function to toggle the sidebar visibility on small screens
      function toggleSidebar() {
        const sidebar = document.querySelector('.sidebar');
        sidebar.classList.toggle('show');
      }

      // Function to switch between different tabs (sections) in the dashboard
      function showTab(tabId) {
        document
          .querySelectorAll(".admin-content")
          .forEach((div) => (div.style.display = "none"));
        document.getElementById(tabId).style.display = "block";

        // Update active button
        document
          .querySelectorAll(".nav-btn")
          .forEach((btn) => btn.classList.remove("active-btn"));
        event.target.classList.add("active-btn");

        // Close sidebar on small screens after selecting a tab
        document.querySelector('.sidebar').classList.remove('show');
      }

      // Bio Logic: Function to save the user's bio to local storage
      function saveBio() {
        localStorage.setItem(
          "userBio",
          document.getElementById("bioInput").value
        );
        alert("Bio Updated!");
      }
      // Initialize bio input with saved value from local storage
      document.getElementById("bioInput").value =
        localStorage.getItem("userBio") || "";

      // Project Logic: Function to load and display projects from local storage
      function loadProjects() {
        const projects = JSON.parse(localStorage.getItem("projects")) || [];
        const list = document.getElementById("projectList");
        list.innerHTML = "";
        projects.forEach((p, index) => {
          list.innerHTML += `<tr><td>${p.name}</td><td><button onclick="deleteProject(${index})" class="delete-btn">Delete</button></td></tr>`;
        });
      }

      // Function to add a new project to local storage and refresh the display
      function addProject() {
        const projects = JSON.parse(localStorage.getItem("projects")) || [];
        projects.push({
          name: document.getElementById("pName").value,
          desc: document.getElementById("pDesc").value,
          image: document.getElementById("pImg").value,
        });
        localStorage.setItem("projects", JSON.stringify(projects));
        loadProjects();
        alert("Project Added!");
      }

      // Function to delete a project by index from local storage and refresh the display
      function deleteProject(index) {
        let projects = JSON.parse(localStorage.getItem("projects"));
        projects.splice(index, 1);
        localStorage.setItem("projects", JSON.stringify(projects));
        loadProjects();
      }

      // Inbox Logic: Function to load and display messages from local storage
      function loadMessages() {
        const msgs = JSON.parse(localStorage.getItem("messages")) || [];
        const container = document.getElementById("messageList");
        container.innerHTML = msgs.length ? "" : "No messages yet.";
        msgs.forEach((m) => {
          container.innerHTML += `
                <div class="card mb-2 p-2">
                    <strong>From: ${m.name} (${m.email})</strong>
                    <p>${m.msg}</p>
                </div>`;
        });
      }

      // Initial loads: Load projects and messages when the page loads
      loadProjects();
      loadMessages();

      // Add fade-in animation to sidebar on page load
     window.addEventListener('DOMContentLoaded', () => {

    const sidebar = document.querySelector('.sidebar');

    setTimeout(() => {
        sidebar.classList.add('loaded');
    }, 100);

});
    </script>
  </body>
</html>
